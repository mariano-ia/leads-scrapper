name: Daily Scrape

on:
  schedule:
    # Lunes/miércoles/viernes 9am UTC = 6am Argentina.
    # 3x/semana es suficiente: las empresas top-growth no cambian día a día.
    # Bajamos de 6x/semana → 3x/semana para mitad de consumo en GitHub Actions.
    - cron: "0 9 * * 1,3,5"
  push:
    branches: [main]
    paths:
      - "scrapers/**"
      - ".github/workflows/daily_scrape.yml"
  workflow_dispatch:
    inputs:
      top_growth:
        description: "N empresas top growth a escrapear (extra al radar)"
        required: false
        default: "100"
      per_company_max:
        description: "Max items por empresa"
        required: false
        default: "3"

jobs:
  scrape_news:
    name: Scrape Google News
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scrapers/pyproject.toml

      - name: Env presence check
        run: |
          ok=true
          for k in NEXT_PUBLIC_SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            v="${!k}"
            if [ -z "$v" ]; then
              echo "::error::secret $k is EMPTY in this run"
              ok=false
            else
              echo "secret $k present (len=${#v})"
            fi
          done
          $ok

      - name: Install
        working-directory: scrapers
        run: pip install -e .

      - name: Run Google News scraper
        working-directory: scrapers
        run: |
          set -o pipefail
          TOP="${{ github.event.inputs.top_growth }}"
          PER="${{ github.event.inputs.per_company_max }}"
          : "${TOP:=100}"
          : "${PER:=3}"
          python -m leads_scrapper.jobs.scrape_news --top-growth "$TOP" --per-company-max "$PER" --concurrency 5 2>&1 | tee /tmp/news.log

      - name: Report failure to scrape_runs
        if: failure()
        run: |
          TAIL=$(tail -c 4000 /tmp/news.log 2>/dev/null | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          curl -sS -X POST "$NEXT_PUBLIC_SUPABASE_URL/rest/v1/scrape_runs" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"source\":\"diag_daily_scrape_news\",\"status\":\"failed\",\"finished_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"errors\":[{\"run_id\":\"${{ github.run_id }}\",\"stderr_tail\":$TAIL}]}"
          echo "diagnostic posted to scrape_runs"

  scrape_bo:
    name: Scrape Boletín Oficial
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scrapers/pyproject.toml

      - name: Install
        working-directory: scrapers
        run: pip install -e .

      - name: Run BO scraper (best-effort, matchea por CUIT)
        working-directory: scrapers
        continue-on-error: true
        run: python -m leads_scrapper.jobs.scrape_bo
