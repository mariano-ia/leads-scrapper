name: Daily Scrape

on:
  schedule:
    - cron: "0 9 * * 1,3,5"
  push:
    branches: [main]
    paths:
      - "scrapers/**"
      - ".github/workflows/daily_scrape.yml"
  workflow_dispatch:
    inputs:
      top_growth:
        description: "N empresas top growth a escrapear (extra al radar)"
        required: false
        default: "100"
      per_company_max:
        description: "Max items por empresa"
        required: false
        default: "3"

jobs:
  scrape_news:
    name: Scrape Google News
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://cdklaxvxngmldpdiihgo.supabase.co' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scrapers/pyproject.toml

      - name: Env presence check (no-fail)
        id: envcheck
        run: |
          PRESENT=""
          EMPTY=""
          for k in NEXT_PUBLIC_SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            v="${!k}"
            if [ -z "$v" ]; then
              EMPTY="$EMPTY $k"
              echo "::warning::secret $k is EMPTY"
            else
              PRESENT="$PRESENT $k(len=${#v})"
              echo "secret $k present (len=${#v})"
            fi
          done
          {
            echo "present<<EOF"
            echo "$PRESENT"
            echo "EOF"
            echo "empty<<EOF"
            echo "$EMPTY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install
        working-directory: scrapers
        run: pip install -e .

      - name: Run Google News scraper
        working-directory: scrapers
        run: |
          set -o pipefail
          TOP="${{ github.event.inputs.top_growth }}"
          PER="${{ github.event.inputs.per_company_max }}"
          : "${TOP:=100}"
          : "${PER:=3}"
          python -m leads_scrapper.jobs.scrape_news --top-growth "$TOP" --per-company-max "$PER" --concurrency 5 2>&1 | tee /tmp/news.log

      - name: Report status to scrape_runs (always)
        if: always()
        run: |
          STATUS="${{ job.status }}"
          PRESENT='${{ steps.envcheck.outputs.present }}'
          EMPTY='${{ steps.envcheck.outputs.empty }}'
          if [ -f /tmp/news.log ]; then
            TAIL=$(tail -c 4000 /tmp/news.log | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          else
            TAIL='"(no log file — pre-python failure)"'
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY missing"
            exit 0
          fi
          curl -sS -X POST "$NEXT_PUBLIC_SUPABASE_URL/rest/v1/scrape_runs" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"source\":\"diag_daily_scrape_news\",\"status\":\"failed\",\"finished_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"errors\":[{\"run_id\":\"${{ github.run_id }}\",\"job_status\":\"$STATUS\",\"secrets_present\":\"$PRESENT\",\"secrets_empty\":\"$EMPTY\",\"stderr_tail\":$TAIL}]}"
          echo "diagnostic posted"

  scrape_bo:
    name: Scrape Boletín Oficial
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://cdklaxvxngmldpdiihgo.supabase.co' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scrapers/pyproject.toml

      - name: Install
        working-directory: scrapers
        run: pip install -e .

      - name: Run BO scraper (best-effort, matchea por CUIT)
        working-directory: scrapers
        continue-on-error: true
        run: python -m leads_scrapper.jobs.scrape_bo
