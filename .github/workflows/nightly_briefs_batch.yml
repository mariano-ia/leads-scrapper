name: Nightly Briefs (Batch API)

on:
  schedule:
    # Cada día 4am UTC = 1am Argentina. Batch puede tardar hasta 24h
    # de SLA Anthropic; iniciarlo nocturno y los resultados están listos
    # al otro día. 50% más barato que el endpoint síncrono.
    - cron: "0 4 * * *"
  push:
    branches: [main]
    paths:
      - "scrapers/**"
      - ".github/workflows/nightly_briefs_batch.yml"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max briefs por batch"
        required: false
        default: "100"
      poll_interval:
        description: "Segundos entre polls al batch"
        required: false
        default: "60"

jobs:
  briefs:
    name: Generate briefs via Anthropic Batch API
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONUNBUFFERED: "1"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scrapers/pyproject.toml

      - name: Env presence check
        run: |
          ok=true
          for k in NEXT_PUBLIC_SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY ANTHROPIC_API_KEY; do
            v="${!k}"
            if [ -z "$v" ]; then
              echo "::error::secret $k is EMPTY in this run"
              ok=false
            else
              echo "secret $k present (len=${#v})"
            fi
          done
          $ok

      - name: Install
        working-directory: scrapers
        run: pip install -e .

      - name: Run batch briefs job
        id: brief
        working-directory: scrapers
        run: |
          set -o pipefail
          # Limit defaults to 100 unless triggered via workflow_dispatch
          LIMIT="${{ github.event.inputs.limit }}"
          POLL="${{ github.event.inputs.poll_interval }}"
          : "${LIMIT:=100}"
          : "${POLL:=60}"
          python -m leads_scrapper.jobs.generate_briefs_batch --limit "$LIMIT" --poll-interval "$POLL" 2>&1 | tee /tmp/briefs.log
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Report failure to scrape_runs
        if: failure()
        run: |
          # Capturamos hasta 4000 chars del log para que entre en una columna jsonb cómoda.
          TAIL=$(tail -c 4000 /tmp/briefs.log 2>/dev/null | python -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          curl -sS -X POST "$NEXT_PUBLIC_SUPABASE_URL/rest/v1/scrape_runs" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"source\":\"diag_nightly_briefs_batch\",\"status\":\"failed\",\"finished_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"errors\":[{\"run_id\":\"${{ github.run_id }}\",\"stderr_tail\":$TAIL}]}"
          echo "diagnostic posted to scrape_runs"
