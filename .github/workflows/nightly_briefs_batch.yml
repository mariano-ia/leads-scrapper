name: Nightly Briefs (Batch API)

on:
  schedule:
    # Cada día 4am UTC = 1am Argentina. Batch puede tardar hasta 24h
    # de SLA Anthropic; iniciarlo nocturno y los resultados están listos
    # al otro día. 50% más barato que el endpoint síncrono.
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max briefs por batch"
        required: false
        default: "100"
      poll_interval:
        description: "Segundos entre polls al batch"
        required: false
        default: "60"

jobs:
  briefs:
    name: Generate briefs via Anthropic Batch API
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scrapers/pyproject.toml

      - name: Install
        working-directory: scrapers
        run: pip install -e .

      - name: Run batch briefs job
        working-directory: scrapers
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
        run: |
          python -m leads_scrapper.jobs.generate_briefs_batch \
            --limit ${{ inputs.limit || '100' }} \
            --poll-interval ${{ inputs.poll_interval || '60' }}
