name: Nightly Briefs (Batch API)

on:
  schedule:
    # Cada día 4am UTC = 1am Argentina. Batch puede tardar hasta 24h
    # de SLA Anthropic; iniciarlo nocturno y los resultados están listos
    # al otro día. 50% más barato que el endpoint síncrono.
    - cron: "0 4 * * *"
  push:
    branches: [main]
    paths:
      - "scrapers/**"
      - ".github/workflows/nightly_briefs_batch.yml"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max briefs por batch"
        required: false
        default: "100"
      poll_interval:
        description: "Segundos entre polls al batch"
        required: false
        default: "60"

jobs:
  briefs:
    name: Generate briefs via Anthropic Batch API
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PYTHONUNBUFFERED: "1"
      # URL Supabase NO es secreto (NEXT_PUBLIC_*, embebido en client bundle).
      # Hardcodeo como fallback para que el step de diagnóstico SIEMPRE
      # pueda postear, incluso si los secrets se vaciaron.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://cdklaxvxngmldpdiihgo.supabase.co' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scrapers/pyproject.toml

      - name: Env presence check (no-fail)
        id: envcheck
        run: |
          PRESENT=""
          EMPTY=""
          for k in NEXT_PUBLIC_SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY ANTHROPIC_API_KEY ANTHROPIC_MODEL; do
            v="${!k}"
            if [ -z "$v" ]; then
              EMPTY="$EMPTY $k"
              echo "::warning::secret $k is EMPTY"
            else
              PRESENT="$PRESENT $k(len=${#v})"
              echo "secret $k present (len=${#v})"
            fi
          done
          {
            echo "present<<EOF"
            echo "$PRESENT"
            echo "EOF"
            echo "empty<<EOF"
            echo "$EMPTY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install
        working-directory: scrapers
        run: pip install -e .

      - name: Run batch briefs job
        id: brief
        working-directory: scrapers
        run: |
          set -o pipefail
          LIMIT="${{ github.event.inputs.limit }}"
          POLL="${{ github.event.inputs.poll_interval }}"
          : "${LIMIT:=100}"
          : "${POLL:=60}"
          python -m leads_scrapper.jobs.generate_briefs_batch --limit "$LIMIT" --poll-interval "$POLL" 2>&1 | tee /tmp/briefs.log

      - name: Report status to scrape_runs (always)
        if: always()
        run: |
          STATUS="${{ job.status }}"
          PRESENT='${{ steps.envcheck.outputs.present }}'
          EMPTY='${{ steps.envcheck.outputs.empty }}'
          if [ -f /tmp/briefs.log ]; then
            TAIL=$(tail -c 4000 /tmp/briefs.log | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          else
            TAIL='"(no log file — pre-python failure)"'
          fi
          # Si no hay service role, posteo igual con la anon key (read-only RLS).
          # Pero scrape_runs no admite anon insert; en ese caso simplemente loguea.
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY missing — cannot post diagnostic"
            echo "{present:$PRESENT empty:$EMPTY status:$STATUS tail:$TAIL}"
            exit 0
          fi
          curl -sS -X POST "$NEXT_PUBLIC_SUPABASE_URL/rest/v1/scrape_runs" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"source\":\"diag_nightly_briefs_batch\",\"status\":\"failed\",\"finished_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"errors\":[{\"run_id\":\"${{ github.run_id }}\",\"job_status\":\"$STATUS\",\"secrets_present\":\"$PRESENT\",\"secrets_empty\":\"$EMPTY\",\"stderr_tail\":$TAIL}]}"
          echo "diagnostic posted"
