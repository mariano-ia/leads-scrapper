name: Apollo Sync (weekly)

on:
  schedule:
    # Lunes 7am UTC = 4am Argentina
    - cron: "0 7 * * 1"
  push:
    branches: [main]
    paths:
      - "scrapers/**"
      - ".github/workflows/apollo_sync.yml"
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        required: true
        default: "delta"
        type: choice
        options: [initial, delta, targeted_contacts]

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scrapers/pyproject.toml

      - name: Env presence check
        run: |
          ok=true
          for k in NEXT_PUBLIC_SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY APOLLO_API_KEY ANTHROPIC_API_KEY; do
            v="${!k}"
            if [ -z "$v" ]; then
              echo "::error::secret $k is EMPTY in this run"
              ok=false
            else
              echo "secret $k present (len=${#v})"
            fi
          done
          $ok

      - name: Install
        working-directory: scrapers
        run: pip install -e .

      - name: Run Apollo sync
        working-directory: scrapers
        run: |
          set -o pipefail
          MODE="${{ github.event.inputs.mode }}"
          : "${MODE:=delta}"
          # Cap pages para que push-triggered runs no consuman demasiados créditos.
          # Schedule (lunes nocturno) corre sin cap.
          if [ "${{ github.event_name }}" = "push" ]; then
            EXTRA="--max-pages 2"
          else
            EXTRA=""
          fi
          python -m leads_scrapper.jobs.apollo_sync --mode "$MODE" $EXTRA 2>&1 | tee /tmp/apollo.log

      - name: Report failure to scrape_runs
        if: failure()
        run: |
          TAIL=$(tail -c 4000 /tmp/apollo.log 2>/dev/null | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          curl -sS -X POST "$NEXT_PUBLIC_SUPABASE_URL/rest/v1/scrape_runs" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"source\":\"diag_apollo_sync\",\"status\":\"failed\",\"finished_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"errors\":[{\"run_id\":\"${{ github.run_id }}\",\"stderr_tail\":$TAIL}]}"
          echo "diagnostic posted to scrape_runs"
